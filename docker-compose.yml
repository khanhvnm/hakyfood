services:
  postgres:
    image: postgres:16-alpine
    container_name: hakyfood-postgres
    environment:
      POSTGRES_DB: hakyfood
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hakyfood"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hakyfood-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./hakyfood-backend
      dockerfile: Dockerfile
    container_name: hakyfood-backend
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/hakyfood
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PROFILE=dev
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:5173,http://127.0.0.1:5173}
      - JWT_SIGNER_KEY=${JWT_SIGNER_KEY:-3cfa76a3b860cb7019f02d8b2f57932b9057e3a3b860cb7019f02d8b2f57932b9057e3a3b860cb7}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-dummy-client-id}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./hakyfood-web
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:8080/api/v1
        - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-dummy-client-id}
    container_name: hakyfood-web
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
